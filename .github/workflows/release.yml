name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: rbd
            ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: rbd.exe
            ext: ".exe"
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: rbd
            ext: ""

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        shell: bash
        run: echo "ver=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libssl-dev

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          ARCHIVE="rbd-v${{ steps.version.outputs.ver }}-${{ matrix.target }}.tar.gz"
          cd target/${{ matrix.target }}/release
          tar czf "../../../${ARCHIVE}" ${{ matrix.binary }}
          echo "artifact=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          $ver = "${{ steps.version.outputs.ver }}"
          $target = "${{ matrix.target }}"
          $archive = "rbd-v${ver}-${target}.zip"
          Set-Location -Path "target/${{ matrix.target }}/release"
          Compress-Archive -Path ${{ matrix.binary }} -DestinationPath "../../../${archive}"
          echo "artifact=${archive}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rbd-v${{ steps.version.outputs.ver }}-${{ matrix.target }}
          path: ${{ env.artifact }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4

      - name: Extract version
        id: version
        shell: bash
        run: echo "ver=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Show artifacts
        run: ls -R

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: |
            rbd-v${{ steps.version.outputs.ver }}-x86_64-unknown-linux-gnu/rbd-v${{ steps.version.outputs.ver }}-x86_64-unknown-linux-gnu.tar.gz
            rbd-v${{ steps.version.outputs.ver }}-x86_64-pc-windows-msvc/rbd-v${{ steps.version.outputs.ver }}-x86_64-pc-windows-msvc.zip
            rbd-v${{ steps.version.outputs.ver }}-aarch64-apple-darwin/rbd-v${{ steps.version.outputs.ver }}-aarch64-apple-darwin.tar.gz
          draft: false
          prerelease: false
          generate_release_notes: true
